<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售数据分析看板</title>
    <script src="https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js"></script>
    <script>
        // ECharts加载失败处理
        if (typeof echarts === 'undefined') {
            document.write('<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"><\/script>');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 16px;
            color: #7f8c8d;
        }

        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-value {
            font-size: 28px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 5px;
        }

        .kpi-title {
            font-size: 14px;
            color: #7f8c8d;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            height: 400px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
        }

        .single-chart {
            grid-column: 1 / -1;
            height: 400px;
        }

        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            
            .chart-container {
                height: 300px;
            }
            
            .kpi-section {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>销售数据分析看板</h1>
            <p>综合销售业绩与趋势分析</p>
        </div>

        <div class="kpi-section">
            <div class="kpi-card">
                <div class="kpi-value">¥1,245,678</div>
                <div class="kpi-title">总销售额</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">1,234</div>
                <div class="kpi-title">总订单数</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">15.2%</div>
                <div class="kpi-title">同比增长率</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">¥1,018</div>
                <div class="kpi-title">平均客单价</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-container">
                <div class="chart-title">月度销售趋势</div>
                <div id="monthlyTrendChart" style="width: 100%; height: 340px;"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">产品类别销售分布</div>
                <div id="categoryPieChart" style="width: 100%; height: 340px;"></div>
            </div>
            <div class="chart-container single-chart">
                <div class="chart-title">地区销售排名</div>
                <div id="regionBarChart" style="width: 100%; height: 340px;"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">客户类型销售占比</div>
                <div id="customerTypePieChart" style="width: 100%; height: 340px;"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">季度销售对比</div>
                <div id="quarterComparisonChart" style="width: 100%; height: 340px;"></div>
            </div>
        </div>
    </div>

    <script>
        // 确保ECharts已加载
        function initCharts() {
            if (typeof echarts === 'undefined') {
                setTimeout(initCharts, 100);
                return;
            }

            // 月度销售趋势图
            const monthlyTrendChart = echarts.init(document.getElementById('monthlyTrendChart'));
            const monthlyTrendOption = {
                tooltip: {
                    trigger: 'axis',
                    formatter: '{b}<br/>{a}: ¥{c}'
                },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: '¥{value}'
                    }
                },
                series: [{
                    name: '销售额',
                    type: 'line',
                    data: [95000, 110000, 135000, 120000, 145000, 165000, 180000, 175000, 190000, 210000, 235000, 250000],
                    smooth: true,
                    lineStyle: {
                        width: 3
                    },
                    itemStyle: {
                        color: '#3498db'
                    }
                }]
            };
            monthlyTrendChart.setOption(monthlyTrendOption);

            // 产品类别销售分布饼图
            const categoryPieChart = echarts.init(document.getElementById('categoryPieChart'));
            const categoryPieOption = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: ¥{c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left'
                },
                series: [{
                    name: '销售金额',
                    type: 'pie',
                    radius: '70%',
                    data: [
                        {value: 350000, name: '电子产品'},
                        {value: 280000, name: '服装服饰'},
                        {value: 220000, name: '家居用品'},
                        {value: 180000, name: '食品饮料'},
                        {value: 150000, name: '图书音像'},
                        {value: 65678, name: '其他'}
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0,0,0,0.5)'
                        }
                    }
                }]
            };
            categoryPieChart.setOption(categoryPieOption);

            // 地区销售排名柱状图
            const regionBarChart = echarts.init(document.getElementById('regionBarChart'));
            const regionBarOption = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    },
                    formatter: '{b}<br/>{a}: ¥{c}'
                },
                xAxis: {
                    type: 'category',
                    data: ['华东', '华南', '华北', '华中', '西南', '东北', '西北'],
                    axisLabel: {
                        rotate: 45
                    }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: '¥{value}'
                    }
                },
                series: [{
                    name: '销售额',
                    type: 'bar',
                    data: [280000, 245000, 210000, 185000, 165000, 145000, 120000],
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: '#83bff6'},
                            {offset: 0.5, color: '#188df0'},
                            {offset: 1, color: '#188df0'}
                        ])
                    }
                }]
            };
            regionBarChart.setOption(regionBarOption);

            // 客户类型销售占比饼图
            const customerTypePieChart = echarts.init(document.getElementById('customerTypePieChart'));
            const customerTypePieOption = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: ¥{c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left'
                },
                series: [{
                    name: '销售金额',
                    type: 'pie',
                    radius: '70%',
                    data: [
                        {value: 520000, name: '企业客户'},
                        {value: 450000, name: '个人客户'},
                        {value: 275678, name: '政府机构'}
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0,0,0,0.5)'
                        }
                    }
                }]
            };
            customerTypePieChart.setOption(customerTypePieOption);

            // 季度销售对比柱状图
            const quarterComparisonChart = echarts.init(document.getElementById('quarterComparisonChart'));
            const quarterComparisonOption = {
                tooltip: {
                    trigger: 'axis',
                    formatter: '{b}<br/>{a}: ¥{c}'
                },
                xAxis: {
                    type: 'category',
                    data: ['Q1', 'Q2', 'Q3', 'Q4']
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: '¥{value}'
                    }
                },
                series: [{
                    name: '销售额',
                    type: 'bar',
                    data: [345000, 380000, 420000, 500000],
                    itemStyle: {
                        color: '#2ecc71'
                    }
                }]
            };
            quarterComparisonChart.setOption(quarterComparisonOption);

            // 响应式处理
            window.addEventListener('resize', function() {
                monthlyTrendChart.resize();
                categoryPieChart.resize();
                regionBarChart.resize();
                customerTypePieChart.resize();
                quarterComparisonChart.resize();
            });
        }

        // 页面加载完成后初始化图表
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCharts);
        } else {
            initCharts();
        }
    </script>
</body>
</html>
