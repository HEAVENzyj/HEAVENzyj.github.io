<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商平台数据分析看板</title>
    <script src="https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js"></script>
    <script>
        if (typeof echarts === 'undefined') {
            document.write('<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"><\/script>');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-value {
            font-size: 2.2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .kpi-title {
            color: #666;
            font-size: 1em;
            margin-bottom: 5px;
        }

        .trend-up { color: #e74c3c; }
        .trend-down { color: #27ae60; }

        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .chart-row {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            height: 400px;
        }

        .chart-title {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .small-chart-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            height: 300px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
            margin-top: 30px;
        }

        .highlight-green {
            color: #27ae60;
        }

        .highlight-red {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>电商平台数据分析看板</h1>
            <p>实时监控销售业绩、用户行为及商品表现</p>
        </div>

        <div class="kpi-section">
            <div class="kpi-card">
                <div class="kpi-title">总销售额</div>
                <div class="kpi-value highlight-green">¥2,847,392</div>
                <div class="kpi-trend trend-up">↑ 12.5% 同比增长</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">订单总数</div>
                <div class="kpi-value">15,847</div>
                <div class="kpi-trend trend-up">↑ 8.3% 同比增长</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">活跃用户</div>
                <div class="kpi-value">89,234</div>
                <div class="kpi-trend trend-down">↓ 2.1% 环比下降</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">转化率</div>
                <div class="kpi-value">4.2%</div>
                <div class="kpi-trend trend-up">↑ 0.8% 同比增长</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-container">
                <div class="chart-title">月度销售额趋势</div>
                <div id="salesTrendChart" style="height: 100%;"></div>
            </div>
            <div class="small-chart-container">
                <div class="chart-title">用户性别分布</div>
                <div id="genderChart" style="height: 100%;"></div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-container">
                <div class="chart-title">商品类别销售占比</div>
                <div id="categoryChart" style="height: 100%;"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">地区销售分布</div>
                <div id="regionChart" style="height: 100%;"></div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-container">
                <div class="chart-title">客单价分析</div>
                <div id="customerValueChart" style="height: 100%;"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">用户来源渠道</div>
                <div id="channelChart" style="height: 100%;"></div>
            </div>
        </div>

        <div class="footer">
            <p>数据更新时间：2024年12月 | 数据来源：电商平台后台系统</p>
        </div>
    </div>

    <script>
        function initCharts() {
            if (typeof echarts === 'undefined') {
                setTimeout(initCharts, 100);
                return;
            }

            // 月度销售额趋势图
            const salesTrendChart = echarts.init(document.getElementById('salesTrendChart'));
            salesTrendChart.setOption({
                title: {},
                tooltip: {
                    trigger: 'axis',
                    formatter: '{b}<br/>{a}: ¥{c}'
                },
                legend: {
                    data: ['销售额']
                },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: '¥{value}'
                    }
                },
                series: [{
                    name: '销售额',
                    type: 'line',
                    data: [1800000, 1950000, 2100000, 1900000, 2200000, 2400000, 2300000, 2500000, 2600000, 2700000, 2750000, 2847392],
                    smooth: true,
                    itemStyle: {
                        color: '#667eea'
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#667eea' },
                            { offset: 1, color: '#667eea00' }
                        ])
                    }
                }]
            });

            // 用户性别分布饼图
            const genderChart = echarts.init(document.getElementById('genderChart'));
            genderChart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c} ({d}%)'
                },
                series: [{
                    name: '性别分布',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: [
                        { value: 52342, name: '女性' },
                        { value: 36892, name: '男性' }
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            });

            // 商品类别销售占比饼图
            const categoryChart = echarts.init(document.getElementById('categoryChart'));
            categoryChart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: ¥{c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left'
                },
                series: [{
                    name: '销售占比',
                    type: 'pie',
                    radius: '70%',
                    data: [
                        { value: 854217, name: '电子产品' },
                        { value: 684365, name: '服装服饰' },
                        { value: 569478, name: '家居用品' },
                        { value: 398567, name: '美妆护肤' },
                        { value: 240765, name: '食品饮料' },
                        { value: 100000, name: '其他' }
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            });

            // 地区销售分布柱状图
            const regionChart = echarts.init(document.getElementById('regionChart'));
            regionChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                xAxis: {
                    type: 'category',
                    data: ['华东', '华南', '华北', '华中', '西南', '东北', '西北']
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: '¥{value}'
                    }
                },
                series: [{
                    data: [780000, 650000, 520000, 480000, 320000, 280000, 190000],
                    type: 'bar',
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#667eea' },
                            { offset: 1, color: '#764ba2' }
                        ])
                    }
                }]
            });

            // 客单价分析散点图
            const customerValueChart = echarts.init(document.getElementById('customerValueChart'));
            customerValueChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: '用户ID: {b}<br/>客单价: ¥{c}'
                },
                xAxis: {
                    type: 'category',
                    data: Array.from({length: 50}, (_, i) => `用户${i + 1}`)
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: '¥{value}'
                    }
                },
                series: [{
                    data: [120, 150, 89, 210, 170, 130, 190, 160, 140, 180, 220, 110, 165, 145, 175, 195, 125, 135, 155, 175, 185, 145, 165, 150, 130, 140, 160, 170, 180, 190, 120, 130, 140, 150, 160, 170, 180, 190, 200, 210, 120, 130, 140, 150, 160, 170, 180, 190, 200, 210],
                    type: 'scatter',
                    symbolSize: function (val) {
                        return val / 3;
                    },
                    itemStyle: {
                        color: '#667eea'
                    }
                }]
            });

            // 用户来源渠道饼图
            const channelChart = echarts.init(document.getElementById('channelChart'));
            channelChart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c}人 ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left'
                },
                series: [{
                    name: '来源渠道',
                    type: 'pie',
                    radius: '60%',
                    data: [
                        { value: 35000, name: '搜索引擎' },
                        { value: 25000, name: '社交媒体' },
                        { value: 18000, name: '直接访问' },
                        { value: 8000, name: '广告投放' },
                        { value: 3234, name: '其他' }
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            });

            window.addEventListener('resize', function() {
                salesTrendChart.resize();
                genderChart.resize();
                categoryChart.resize();
                regionChart.resize();
                customerValueChart.resize();
                channelChart.resize();
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCharts);
        } else {
            initCharts();
        }
    </script>
</body>
</html>
