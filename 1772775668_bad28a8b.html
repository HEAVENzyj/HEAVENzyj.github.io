<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零食销售数据分析看板</title>
    <script src="https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js"></script>
    <script>
        // ECharts加载失败处理
        if (typeof echarts === 'undefined') {
            document.write('<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"><\/script>');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-value {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .kpi-title {
            color: #666;
            font-size: 1em;
        }

        .kpi-trend {
            font-size: 0.9em;
            margin-top: 5px;
        }

        .positive {
            color: #52c41a;
        }

        .negative {
            color: #ff4d4f;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            height: 400px;
        }

        .chart-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .chart-wrapper {
            width: 100%;
            height: 350px;
        }

        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            
            .kpi-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .kpi-section {
                grid-template-columns: 1fr;
            }
            
            .chart-container {
                height: 350px;
            }
            
            .chart-wrapper {
                height: 300px;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>零食销售数据分析看板</h1>
            <p>实时监控销售业绩，洞察市场趋势</p>
        </div>

        <div class="kpi-section">
            <div class="kpi-card">
                <div class="kpi-value">¥2,847,500</div>
                <div class="kpi-title">总销售额</div>
                <div class="kpi-trend positive">↑ 12.5% 同比增长</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">15,820</div>
                <div class="kpi-title">总订单数</div>
                <div class="kpi-trend positive">↑ 8.3% 同比增长</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">¥180.00</div>
                <div class="kpi-title">平均客单价</div>
                <div class="kpi-trend negative">↓ 2.1% 同比下降</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value">94.2%</div>
                <div class="kpi-title">客户满意度</div>
                <div class="kpi-trend positive">↑ 3.7% 同比增长</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-container">
                <div class="chart-title">各品类销售额分布</div>
                <div id="pieChart" class="chart-wrapper"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">月度销售趋势</div>
                <div id="lineChart" class="chart-wrapper"></div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-container">
                <div class="chart-title">各地区销售排名</div>
                <div id="barChart" class="chart-wrapper"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">热销商品TOP10</div>
                <div id="topProductsChart" class="chart-wrapper"></div>
            </div>
        </div>

        <div class="footer">
            <p>数据更新时间：2024年1月15日 | 数据来源：销售管理系统</p>
        </div>
    </div>

    <script>
        // 确保ECharts已加载
        function initCharts() {
            if (typeof echarts === 'undefined') {
                setTimeout(initCharts, 100);
                return;
            }

            // 饼图 - 各品类销售额分布
            const pieChart = echarts.init(document.getElementById('pieChart'));
            const pieOption = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: ¥{c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    data: ['薯片类', '糖果类', '巧克力', '坚果类', '饼干类', '饮料类']
                },
                series: [{
                    name: '销售额',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    avoidLabelOverlap: false,
                    data: [
                        {value: 650000, name: '薯片类'},
                        {value: 420000, name: '糖果类'},
                        {value: 580000, name: '巧克力'},
                        {value: 450000, name: '坚果类'},
                        {value: 520000, name: '饼干类'},
                        {value: 227500, name: '饮料类'}
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            };
            pieChart.setOption(pieOption);

            // 折线图 - 月度销售趋势
            const lineChart = echarts.init(document.getElementById('lineChart'));
            const lineOption = {
                tooltip: {
                    trigger: 'axis'
                },
                legend: {
                    data: ['销售额', '订单数']
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
                },
                yAxis: [
                    {
                        type: 'value',
                        name: '销售额 (万元)',
                        position: 'left',
                        axisLine: { show: true }
                    },
                    {
                        type: 'value',
                        name: '订单数',
                        position: 'right',
                        axisLine: { show: true }
                    }
                ],
                series: [
                    {
                        name: '销售额',
                        type: 'line',
                        smooth: true,
                        data: [180, 195, 220, 245, 280, 320, 350, 330, 310, 290, 260, 240],
                        yAxisIndex: 0,
                        areaStyle: {}
                    },
                    {
                        name: '订单数',
                        type: 'line',
                        smooth: true,
                        data: [12000, 12500, 13800, 14200, 15500, 16800, 17500, 16500, 15800, 15200, 14500, 13800],
                        yAxisIndex: 1
                    }
                ]
            };
            lineChart.setOption(lineOption);

            // 柱状图 - 各地区销售排名
            const barChart = echarts.init(document.getElementById('barChart'));
            const barOption = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                xAxis: {
                    type: 'category',
                    data: ['华东', '华南', '华北', '华中', '西南', '西北', '东北']
                },
                yAxis: {
                    type: 'value',
                    name: '销售额 (万元)'
                },
                series: [{
                    name: '销售额',
                    type: 'bar',
                    data: [450, 380, 320, 280, 240, 180, 150],
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#83bff6' },
                            { offset: 0.5, color: '#188df0' },
                            { offset: 1, color: '#188df0' }
                        ])
                    }
                }]
            };
            barChart.setOption(barOption);

            // 条形图 - 热销商品TOP10
            const topProductsChart = echarts.init(document.getElementById('topProductsChart'));
            const topProductsOption = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                xAxis: {
                    type: 'value'
                },
                yAxis: {
                    type: 'category',
                    data: ['乐事薯片', '德芙巧克力', '洽洽瓜子', '旺旺雪饼', '徐福记糖果', '三只松鼠坚果', '奥利奥饼干', '可口可乐', '百事可乐', '蒙牛酸奶']
                },
                series: [{
                    name: '销量',
                    type: 'bar',
                    data: [15800, 14200, 12500, 11800, 10900, 9800, 9200, 8700, 8200, 7600],
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#ff6b6b' },
                            { offset: 0.5, color: '#ee5a24' },
                            { offset: 1, color: '#feca57' }
                        ])
                    }
                }]
            };
            topProductsChart.setOption(topProductsOption);

            // 响应式处理
            window.addEventListener('resize', function() {
                pieChart.resize();
                lineChart.resize();
                barChart.resize();
                topProductsChart.resize();
            });
        }

        // 页面加载完成后初始化图表
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCharts);
        } else {
            initCharts();
        }
    </script>
</body>
</html>
