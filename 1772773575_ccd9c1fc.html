<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进货数据分析看板</title>
    <script src="https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js"></script>
    <script>
        if (typeof echarts === 'undefined') {
            document.write('<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"><\/script>');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .kpi-label {
            font-size: 1em;
            color: #666;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: 400px;
        }

        .chart-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.3em;
            color: #333;
            font-weight: bold;
        }

        .chart-wrapper {
            width: 100%;
            height: 350px;
        }

        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            
            .kpi-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .kpi-section {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .chart-container {
                height: 350px;
            }
            
            .chart-wrapper {
                height: 300px;
            }
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>进货数据分析看板</h1>
            <p>2024年与2025年进货数量对比分析</p>
        </div>

        <div class="kpi-section">
            <div class="kpi-card">
                <div class="kpi-value" id="total2024">398</div>
                <div class="kpi-label">2024年总计进货</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="total2025">600</div>
                <div class="kpi-label">2025年总计进货</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="companyCount">50</div>
                <div class="kpi-label">合作公司数量</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="growthRate">+51%</div>
                <div class="kpi-label">同比增长率</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-container">
                <div class="chart-title">2024年 vs 2025年月度进货对比</div>
                <div id="monthlyChart" class="chart-wrapper"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">主要供应商进货排名</div>
                <div id="supplierChart" class="chart-wrapper"></div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-container">
                <div class="chart-title">2024年各月进货分布</div>
                <div id="year2024Chart" class="chart-wrapper"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">2025年各月进货分布</div>
                <div id="year2025Chart" class="chart-wrapper"></div>
            </div>
        </div>

        <div class="footer">
            <p>数据更新时间：2024年12月 | 数据来源：进货管理系统</p>
        </div>
    </div>

    <script>
        function initCharts() {
            if (typeof echarts === 'undefined') {
                setTimeout(initCharts, 100);
                return;
            }

            // 原始数据处理
            const rawData = [
                ["方程", null, 20, null, null, 1, 50, 6, 0, 1, 78, null, null, null, null, null, null, null, null, null, null, null, null, 0, 78],
                ["江苏十三城科技有限公司", null, 3, 16, null, 11, 1, 9, 9, 12, 61, 2, 1, 3, 2, null, 2, null, null, null, null, null, null, 10, 71],
                ["南京约格商贸有限公司", null, null, null, null, 10, 6, 12, 11, 4, 43, 2, null, null, 2, 2, 2, null, null, null, null, null, null, 8, 51],
                ["南京实开冷暖设备有限公司（刘威）", null, null, null, null, null, null, null, 11, 12, 23, 1, 15, null, null, 2, null, null, null, null, null, null, null, 18, 41],
                ["苏安宝", null, 2, 1, 6, 6, 1, 4, 5, 2, 27, 1, null, 2, 4, 1, 1, null, null, null, null, null, null, 9, 36],
                ["南京程美冷暖设备有限公司", null, null, 3, null, 5, null, null, 10, null, 18, null, 15, null, null, null, null, null, null, null, null, null, null, 15, 33],
                ["南京华威王华忠", null, null, null, null, null, null, null, 4, 7, 11, null, 15, 1, 1, 2, 3, null, null, null, null, null, null, 22, 33],
                ["南京燕兴能源科技有限公司", null, 4, null, 3, 1, 5, 1, 5, 2, 21, 2, 1, null, 2, 2, 2, null, null, null, null, null, null, 9, 30],
                ["南京悦想家冷暖设备有限公司", null, null, null, null, null, null, null, null, 15, 15, 2, 1, 3, 1, 1, 2, null, null, null, null, null, null, 10, 25],
                ["江苏千行环境工程有限公司（孙祥）", null, null, null, null, null, null, 1, 6, 9, 16, 1, null, null, 1, null, 2, null, null, null, null, null, null, 4, 20]
            ];

            // 月度数据汇总
            const months2024 = ['4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const months2025 = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            
            const monthly2024 = [0, 31, 29, 14, 38, 72, 48, 76, 90];
            const monthly2025 = [21, 63, 28, 28, 23, 39, 0, 0, 0, 0, 0, 0];

            // 主要供应商数据
            const suppliers = [];
            const totalAmounts = [];
            
            rawData.forEach(row => {
                if (row[24] !== null && row[24] !== undefined && row[24] !== 'nan' && !isNaN(row[24])) {
                    suppliers.push(row[0]);
                    totalAmounts.push(row[24]);
                }
            });

            // 获取前10大供应商
            const supplierData = suppliers.map((name, index) => ({
                name: name,
                value: totalAmounts[index]
            })).sort((a, b) => b.value - a.value).slice(0, 10);

            // 月度对比图表
            const monthlyChart = echarts.init(document.getElementById('monthlyChart'));
            const monthlyOption = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                legend: {
                    data: ['2024年', '2025年'],
                    top: '10%'
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '20%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: [...months2024, ...months2025],
                    axisTick: {
                        alignWithLabel: true
                    }
                },
                yAxis: {
                    type: 'value'
                },
                series: [
                    {
                        name: '2024年',
                        type: 'bar',
                        data: monthly2024,
                        itemStyle: {
                            color: '#5470c6'
                        }
                    },
                    {
                        name: '2025年',
                        type: 'bar',
                        data: [...monthly2025.slice(0, 3), Array(9).fill(null)],
                        itemStyle: {
                            color: '#91cc75'
                        }
                    }
                ]
            };
            monthlyChart.setOption(monthlyOption);

            // 供应商排名图表
            const supplierChart = echarts.init(document.getElementById('supplierChart'));
            const supplierOption = {
                tooltip: {
                    trigger: 'item'
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'value',
                    boundaryGap: [0, 0.01]
                },
                yAxis: {
                    type: 'category',
                    data: supplierData.map(item => item.name),
                    axisTick: {
                        show: false
                    }
                },
                series: [{
                    name: '进货数量',
                    type: 'bar',
                    data: supplierData.map(item => item.value),
                    itemStyle: {
                        color: '#fac858'
                    }
                }]
            };
            supplierChart.setOption(supplierOption);

            // 2024年月度分布饼图
            const year2024Chart = echarts.init(document.getElementById('year2024Chart'));
            const year2024Option = {
                tooltip: {
                    trigger: 'item'
                },
                legend: {
                    top: '5%',
                    left: 'center'
                },
                series: [{
                    name: '2024年月度分布',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '60%'],
                    data: months2024.map((month, index) => ({
                        name: month,
                        value: monthly2024[index]
                    })),
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            };
            year2024Chart.setOption(year2024Option);

            // 2025年月度分布饼图
            const year2025Chart = echarts.init(document.getElementById('year2025Chart'));
            const year2025Option = {
                tooltip: {
                    trigger: 'item'
                },
                legend: {
                    top: '5%',
                    left: 'center'
                },
                series: [{
                    name: '2025年月度分布',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '60%'],
                    data: months2025.filter(val => val > 0).map((value, index) => ({
                        name: months2025[index],
                        value: value
                    })),
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            };
            year2025Chart.setOption(year2025Option);

            // 响应式处理
            window.addEventListener('resize', function() {
                monthlyChart.resize();
                supplierChart.resize();
                year2024Chart.resize();
                year2025Chart.resize();
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCharts);
        } else {
            initCharts();
        }
    </script>
</body>
</html>
